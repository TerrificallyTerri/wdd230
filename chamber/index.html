<!DOCTYPE html>

    <head>

    <body class="light-mode">

        <header>
            <img src="images/chamber-first-logo6.webp" alt="Middelburg Chamber of Commerce 
                            Logo">
            <h1>Middelburg Chamber Of Commerce</h1>
        </header>


        <button id="menu">≡</button>
        <nav class="navigation">
            <a href="index.html">Home</a>
            <a href="discover.html">Discover</a>
            <a href="directory.html">Directory</a>
            <a href="join.html">Join the Chamber</a>
        </nav>

        <button id="dark-mode-toggle" class="dark-mode-toggle" aria-label="toggle dark mode">
            <span class="icon">🌚 Dark</span>
        </button>

        <main>
            <div class="spacer"></div>
            <!-- Slideshow container -->
            <!-- Lesson 6 - Chamber Home Responsive Images -->
            <div class="slideshow-container">
                <!-- Images with captions -->
                <picture class="mySlides">
                    <source media="(max-width: 600px)" srcset="images/art-small.webp">
                    <source media="(max-width: 880px)" srcset="images/art-medium.webp">
                    <img src="images/art-large.webp" alt="Dr Esther Mahlangu and Ndebele designed BMW">
                </picture>
                <button class="join">Join the Chamber</button>

                <picture class="mySlides">
                    <source media="(max-width: 600px)" srcset="images/field-of-maize-small.webp">
                    <source media="(max-width: 990px)" srcset="images/field-of-maize-med.webp">
                    <img src="images/field-of-maize-large.webp" alt="Rich farmlands around Middelburg">
                </picture>
                <button class="join">Join the Chamber</button>

                <picture class="mySlides">
                    <source media="(max-width: 600px)" srcset="images/mines-small.webp">
                    <source media="(max-width: 990px)" srcset="images/mines-medium.webp">
                    <img src="images/mines-large.webp" alt="Mining industry Mine workers on ore processing plant">
                </picture>
                <button class="join">Join the Chamber</button>

                <picture class="mySlides">
                    <source media="(max-width: 600px)" srcset="images/stainless-steel-small.webp">
                    <source media="(max-width: 990px)" srcset="images/stainless-steel-medium.webp">
                    <img src="images/stainless-steel-large.webp" alt="Stainless Steel production">
                </picture>
                <button class="join">Join the Chamber</button>

                <picture class="mySlides">
                    <source media="(max-width: 600px)" srcset="images/powerstation-small.webp">
                    <source media="(max-width: 990px)" srcset="images/powerstation-medium.webp">
                    <img src="images//powerstation-large.webp"
                        alt="Duvah Power Station with Bonsmara cattle in the foreground">
                </picture>
                <button class="join">Join the Chamber</button>
            </div>
            <div class="spacer2"></div>

            <div class="main-grid">
                <div class="events-card">
                    <h2>Events</h2>
                    <div class="events">
                        <section class="card1">
                            <div class="card-content">
                                <h3 class="card">121<sup>st</sup>Annual Banquet</h3>
                                <picture class="card-img">
                                    <img src="images/banquet-2024.webp" alt="Annual Banquet">
                                </picture>
                                <button class="event-details">Event Details</button>
                            </div>
                        </section>
                        <section class="card2">
                            <div class="card-content">
                                <h3 class="card">2024 MCCI Golf Day</h3>
                                <picture class="card-img">
                                    <img src="images/golfday.webp" alt="Close-up of golf ball on green">
                                </picture>
                                <button class="event-details">Event Details</button>
                            </div>
                        </section>
                        <section class="card3">
                            <div class="card-content">
                                <h3 class="card">Business Buzzer</h3>
                                <picture class="card-img">
                                    <img src="images/buzz.webp" alt="Collaboration of Business people">
                                </picture>
                                <button class="event-details">Event Details</button>
                            </div>
                        </section>
                        <section class="card4">
                            <div class="card-content">
                                <h3 class="card">Women's Day Event</h3>
                                <picture class="card-img">
                                    <img src="images/womens-day.webp" alt="Celebration of women's day event">
                                </picture>
                                <button class="event-details">Event Details</button>
                            </div>
                        </section>
                    </div>
                </div>

                <div class="weather">
                    <h2>Weather</h2>
                    <div class="weather-card">
                        <p>Temperature: <span id="temp">...</span> °F</p>
                        <p>Wind Speed: <span id="speed">...</span> mph</p>
                        <p>Wind Chill: <span id="windChill">Calculaating ...</span> °F</p>
                    </div>
                </div>

                <div class="members">
                    <h2>Proud Chamber Members</h2>
                    <div class="mem-row">
                        <div class="mem-col">
                            <img src="images/logo-armada.webp" alt="Armada Logo">
                            <img src="images/logo-bolt.webp" alt="Bolt Logo">
                            <img src="images/logo-lodge.webp" alt="Lodge Logo">
                            <img src="images/logo-project.webp" alt="Project Logo">
                            <img src="images/logo-seef.webp" alt="Seef Logo">
                        </div>
                        <div class="mem-col">
                            <img src="images/logo-corn.webp" alt="Resturant Logo">
                            <img src="images/logo-makelaars.webp" alt="MAkelaars Logo">
                            <img src="images/logo-shockwave.webp" alt="Shockwave Logo">
                            <img src="images/logo-medo.webp" alt="Medo Logo">
                            <img src="images/logo-elite.webp" alt="Elite Logo">
                            <img src="images/logo-aldes.webp" alt="Aldes Logo">
                        </div>
                    </div>
                </div>
            </div>
